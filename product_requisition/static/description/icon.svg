<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0097A7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00607A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="docGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8f8f9;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background Circle -->
  <circle cx="64" cy="64" r="60" fill="url(#bgGrad)" stroke="#004D60" stroke-width="2"/>

  <!-- Clipboard body -->
  <rect x="30" y="30" width="52" height="66" rx="4" ry="4" fill="url(#docGrad)" stroke="#b2ebf2" stroke-width="1"/>

  <!-- Clipboard clip at top -->
  <rect x="48" y="24" width="16" height="10" rx="3" ry="3" fill="#00607A"/>
  <rect x="44" y="28" width="24" height="6" rx="2" ry="2" fill="#00838F"/>

  <!-- Clipboard header bar -->
  <rect x="33" y="34" width="46" height="7" rx="2" ry="2" fill="#00BCD4" opacity="0.5"/>

  <!-- Requisition lines - item rows -->
  <!-- Row 1: checkbox + line -->
  <rect x="36" y="47" width="5" height="5" rx="1" fill="none" stroke="#80DEEA" stroke-width="1.5"/>
  <rect x="45" y="48" width="28" height="2" rx="1" fill="#90A4AE"/>
  <rect x="45" y="53" width="18" height="2" rx="1" fill="#B0BEC5"/>

  <!-- Row 2: checkbox + line -->
  <rect x="36" y="59" width="5" height="5" rx="1" fill="none" stroke="#80DEEA" stroke-width="1.5"/>
  <rect x="45" y="60" width="32" height="2" rx="1" fill="#90A4AE"/>
  <rect x="45" y="65" width="22" height="2" rx="1" fill="#B0BEC5"/>

  <!-- Row 3: checkbox ticked + line -->
  <rect x="36" y="71" width="5" height="5" rx="1" fill="#00BCD4" stroke="#00BCD4" stroke-width="1"/>
  <path d="M37.2 73.5 L38.5 74.8 L40.8 72.2" stroke="white" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="45" y="72" width="25" height="2" rx="1" fill="#90A4AE"/>
  <rect x="45" y="77" width="15" height="2" rx="1" fill="#B0BEC5"/>

  <!-- Approval stamp / big checkmark badge (bottom-right overlap) -->
  <circle cx="74" cy="76" r="14" fill="#00838F" stroke="#00607A" stroke-width="1.5"/>
  <path d="M68 76 L72 80 L80 70" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Package / box icon top-right (procurement symbol) -->
  <g transform="translate(85, 28)">
    <!-- box -->
    <rect x="0" y="6" width="14" height="12" rx="1.5" fill="none" stroke="white" stroke-width="1.8"/>
    <!-- box lid -->
    <path d="M-1 6 L7 2 L15 6" stroke="white" stroke-width="1.8" fill="none" stroke-linejoin="round"/>
    <!-- center line on box -->
    <line x1="7" y1="6" x2="7" y2="18" stroke="white" stroke-width="1.2"/>
  </g>

  <!-- Workflow arrow at bottom -->
  <path d="M36 103 Q52 108 64 103 Q76 98 90 103" stroke="white" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.7"/>
  <polygon points="88,101 92,103 88,105" fill="white" opacity="0.7"/>
</svg>
